# Welcome to Jekyll!
#
# Site Settings
title: "Debaditya Bhattacharya"
title_separator: "-"
subtitle: "Professional Portfolio"
name: "Debaditya Bhattacharya"
description: "Academic personal website"
url: "https://debbh.me"
baseurl: ""
repository: "tipsyfermion/tipsyfermion.github.io"
teaser: "/assets/images/default-thumb.png"
logo: "/assets/images/site-logo.png"
masthead_title: "Debaditya Bhattacharya"

# Author Profile
author:
  name: "Debaditya Bhattacharya"
  avatar: "/assets/images/profile.jpg"
  bio: "Add your professional biography here"
  location: "Ithaca, NY, USA"
  employer: "Cornell University"
  email: "db799@cornell.edu"
  googlescholar: "https://scholar.google.com/citations?user=oY1SE1oAAAAJ&hl=en"
  github: "tipsyfermion"
  linkedin: "https://www.linkedin.com/in/debbh/"
  orcid: "https://orcid.org/0000-0002-9217-1813"

# Reading Files
include:
  - .htaccess
  - _pages
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .jekyll-cache
  - .jekyll-metadata
  - .now
  - .ruby-version
  - .ruby-gemfile
  - .ruby-gemfile.lock
  - /node_modules
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - public
  - .git
  - .gitignore
keep_files:
  - .git
  - .gitignore
  - .nojekyll
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed # http://sass-lang.com/documentation/file.SASS_REFERENCE.html#output_style

# Outputting
permalink: /:categories/:title/
paginate_path: /blog/page:num/
timezone: # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones

# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# mimic GitHub Pages with --safe
whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# https://github.com/jekyll/jekyll-archives
jekyll-archives:
  enabled:
    - categories
    - tags
  layouts:
    category: archive-taxonomy
    tag: archive-taxonomy
  permalinks:
    category: /categories/:name/
    tag: /tags/:name/

# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development

# Defaults
defaults:
  # _pages
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  # _publications
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: true
  # _talks
  - scope:
      path: ""
      type: talks
    values:
      layout: talk
      author_profile: true
      share: true
  # _teaching
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
      share: true
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true

# Collections
collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

# Site Settings - Theme (using minimal-mistakes)
minimal_mistakes_skin: "default" # "air", "aqua", "contrast", "dark", "dirt", "neon", "mint", "plum", "sunrise"

# Comments
comments:
  provider: # false (default), "disqus", "discourse", "facebook", "staticman", "staticman_v2", "utterances", "giscus"
  disqus:
    shortname:
  discourse:
    server: # https://meta.discourse.org/t/embedding-discourse-comments-via-javascript/31963 , e.g.: meta.discourse.org
  facebook:
    appid:
    num_posts: # 10
    colorscheme: # "light" or "dark"
  utterances:
    theme: # "github-light" (default), "github-dark"
    issue_term: # "pathname" (default)
  giscus:
    repo_id: # Automatically generated by Giscus at https://giscus.app
    category_name: # Full name of the category you chose for 'Discussions'
    category_id: # Automatically generated by Giscus at https://giscus.app
    discussion_term: # "pathname" (default), "url", "title", "og:title"
    reactions_enabled: # '1' for enabled (default), '0' for disabled
    theme: # "light" (default), "dark", "dark_dimmed", "transparent_dark", "preferred_color_scheme"
  staticman:
    branch: # If you're not using `master` branch e.g. `source` branch on `gh-pages`
    endpoint: # https://staticman3.herokuapp.com/v3/entry/github/

# SEO
google_site_verification:
bing_site_verification:
alexa_site_verification:
yandex_site_verification:
naver_site_verification:

# Search
search: true # true, false (default)
search_full_content: true # true, false (default)
search_provider: google # lunr (default), algolia, google

# Analytics
analytics:
  provider: google # false (default), "google", "google-universal", "custom"
  google:
    tracking_id:
    anonymize_ip: # true, false (default)
